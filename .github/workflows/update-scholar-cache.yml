name: Update Google Scholar Cache

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

permissions:
  contents: write

jobs:
  update-scholar-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Refresh Google Scholar cache
        run: python3 scripts/update_scholar.py

      - name: Commit updated cache if needed
        run: |
          if git diff --quiet -- data/scholar.json data/scholar.js; then
            echo "No cache changes to commit."
            exit 0
          fi

          git add data/scholar.json data/scholar.js
          GIT_AUTHOR_NAME="github-actions[bot]" \
          GIT_AUTHOR_EMAIL="41898282+github-actions[bot]@users.noreply.github.com" \
          GIT_COMMITTER_NAME="github-actions[bot]" \
          GIT_COMMITTER_EMAIL="41898282+github-actions[bot]@users.noreply.github.com" \
          git commit -m "chore: update scholar citation cache"
          git push
